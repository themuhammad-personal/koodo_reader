name: Build Android APK (self-build, unsigned)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install web app dependencies
        # --ignore-scripts skips the Electron-specific postinstall
        # (native module rebuild) which isn't needed for the web/Android build
        run: yarn install --ignore-scripts --network-timeout 600000

      - name: Build production web bundle
        run: yarn build

      - name: Install Capacitor
        run: npm install --no-save @capacitor/core @capacitor/android @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web build into Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: koodo-reader-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
